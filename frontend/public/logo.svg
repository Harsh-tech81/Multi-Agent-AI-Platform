<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"></stop>
      <stop offset="100%" stop-color="#7C3AED"></stop>
    </linearGradient>
  </defs>

  <!-- Connections -->
  <line x1="256" y1="110" x2="150" y2="220" stroke="url(#grad)" stroke-width="18" stroke-linecap="round"></line>
  <line x1="256" y1="110" x2="362" y2="220" stroke="url(#grad)" stroke-width="18" stroke-linecap="round"></line>
  <line x1="150" y1="220" x2="256" y2="360" stroke="url(#grad)" stroke-width="18" stroke-linecap="round"></line>
  <line x1="362" y1="220" x2="256" y2="360" stroke="url(#grad)" stroke-width="18" stroke-linecap="round"></line>

  <!-- Agent Nodes -->
  <circle cx="256" cy="110" r="42" fill="url(#grad)"></circle>
  <circle cx="150" cy="220" r="32" fill="url(#grad)"></circle>
  <circle cx="362" cy="220" r="32" fill="url(#grad)"></circle>
  <circle cx="256" cy="360" r="38" fill="url(#grad)"></circle>

  <!-- Center -->
  <circle cx="256" cy="240" r="55" fill="white" stroke="url(#grad)" stroke-width="18"></circle>

  <!-- AI Letter -->
  <text x="256" y="255" font-size="44" font-family="Arial, Helvetica, sans-serif" font-weight="700" text-anchor="middle" fill="#2563EB">
    AI
  </text>
</svg>